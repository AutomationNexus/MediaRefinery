on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: automationnexus/.github/.github/workflows/ci.yml@v1
    with:
      branch-model: main-dev
      runner-labels: '["ubuntu-latest"]'
      python-version: "3.11"
      node-version: "24"
      has-frontend: true
      has-e2e: true
      has-security: true
      spa-artifact-path: src/mediarefinery/web/
      lint-paths: src tests tools
      pip-install-cmd: 'python -m venv .venv && .venv/bin/pip install -e ".[dev,service]" -q'
      test-cmd: >-
        .venv/bin/python -m pytest -m "not playwright" --cov=mediarefinery --cov-report=term-missing:skip-covered --cov-report=json:tmp/coverage.json --cov-fail-under=90 &&
        .venv/bin/python tools/check_coverage.py --json tmp/coverage.json --minimum 90 &&
        .venv/bin/python -m pytest tests/test_scan_privacy.py tests/test_reporter.py tests/test_state.py::test_error_records_redact_paths_secrets_and_media_like_values &&
        .venv/bin/python -m mediarefinery config validate --config templates/config.example.yml &&
        .venv/bin/python -m mediarefinery config validate --config templates/config.preset.sensitive.example.yml &&
        .venv/bin/python -m mediarefinery config validate --config tests/fixtures/config.custom-taxonomy.yml
      e2e-pip-install-cmd: 'pip install -e ".[dev,service]" -r requirements-dev-frontend.txt'
    secrets:
      ci-bot-app-id: ${{ secrets.CI_BOT_APP_ID }}
      ci-bot-app-private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
