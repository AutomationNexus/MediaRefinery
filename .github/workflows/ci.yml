name: CI

# Branch model: feature branches -> PR -> dev; releases/promotions move dev -> main.
# Direct pushes to dev or main are blocked by CI guards and .githooks/pre-push.

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

# ───────────────────────── Architecture toggle ─────────────────────────
# Edit CI_PLATFORMS to flip arch coverage on PR CI. Multi-arch builds run
# in release.yml and nightly.yml — see RELEASE_PLATFORMS / NIGHTLY_PLATFORMS
# in those files. The arm64 cross-build is slow (~8 min under QEMU), so PR
# CI keeps amd64-only by default; release/nightly carry the full multi-arch
# build as the actual release artifact.
env:
  CI_PLATFORMS: linux/amd64

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  guard-dev-direct-push:
    name: Guard Dev Direct Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - name: Require PR merge for dev pushes
        uses: actions/github-script@v8
        with:
          script: |
            const allowedBots = new Set(["github-actions[bot]", "dependabot[bot]"]);
            if (allowedBots.has(context.actor)) {
              core.info("Allowed bot push to dev.");
              return;
            }

            const message = (context.payload.head_commit?.message || "").trim();
            if (
              /^Merge pull request #\d+/m.test(message) ||
              /\(#\d+\)\s*$/.test(message)
            ) {
              core.info("Allowed PR merge push to dev.");
              return;
            }

            const { owner, repo } = context.repo;
            const commitShas = (context.payload.commits || []).map((commit) => commit.id);
            if (commitShas.length === 0) {
              commitShas.push(context.sha);
            }

            for (const commitSha of commitShas) {
              const { data: pullRequests } =
                await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: commitSha,
                });
              if (pullRequests.some((pr) => pr.merged_at)) {
                core.info(`Allowed PR merge push to dev (${pullRequests.map((pr) => "#" + pr.number).join(", ")}).`);
                return;
              }
            }

            core.setFailed(
              "Direct pushes to dev are not allowed. Use a feature branch, open a PR, wait for CI, then merge."
            );

  guard-main-push:
    name: Guard Main Direct Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Require workflow promotion for main pushes
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.actor }}" != "github-actions[bot]" ]; then
            echo "::error::Direct human pushes to main are not allowed. Promote dev to main with the workflow."
            exit 1
          fi
          echo "OK; this is not a direct human push to main."

  guard-dev-source:
    name: Guard Dev Source Branch
    runs-on: ubuntu-latest
    steps:
      - name: Enforce feature-branch PRs to dev
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ github.base_ref }}" != "dev" ]; then
            echo "Not a PR to dev; guard does not apply. OK."
            exit 0
          fi
          if [ "${{ github.head_ref }}" = "dev" ] || [ "${{ github.head_ref }}" = "main" ]; then
            echo "::error::PRs to dev must come from a feature branch, not '${{ github.head_ref }}'."
            exit 1
          fi
          echo "OK; source branch is a feature branch."

  guard-main-source:
    name: Guard Main Source Branch
    # Runs on every CI event. Early-exits with success when not a PR to main,
    # otherwise enforces dev-only PRs to main. We can't use a job-level
    # `if:` here because that produces a SKIPPED conclusion on dev pushes,
    # and branch protection treats a required SKIPPED check as failing,
    # blocking future dev → main merges.
    runs-on: ubuntu-latest
    steps:
      - name: Enforce dev-only PRs to main
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ github.base_ref }}" != "main" ]; then
            echo "Not a PR to main — guard does not apply. OK."
            exit 0
          fi
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "ERROR: PRs to main must come from the 'dev' branch. Got: ${{ github.head_ref }}"
            exit 1
          fi
          echo "OK — source branch is dev."

  guard-main-files:
    name: Guard Main Files
    runs-on: ubuntu-latest
    # Only enforce for PRs targeting main from feature branches.
    # dev → main is the controlled release path and is exempt.
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref != 'dev' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for disallowed files targeting main
        run: |
          if git diff --name-only origin/main...HEAD | grep -iE -f .github/dev-only-paths | grep -q .; then
            echo "ERROR: PR to main contains paths blocked by .github/dev-only-paths"
            git diff --name-only origin/main...HEAD | grep -iE -f .github/dev-only-paths
            exit 1
          fi
          echo "OK — no disallowed files found."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check src tests tools
      # ripgrep is pre-installed on ubuntu-latest.
      - run: bash tools/check-operator-env-gates.sh

  hygiene:
    name: hygiene (secrets + core tree)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: secrets must never be tracked
        run: |
          bad=$(git ls-files | grep -E '^\.env$|\.pem$|(^|/)id_rsa' || true)
          if [ -n "$bad" ]; then
            echo "::error::credential files must never be committed:"
            echo "$bad"
            exit 1
          fi
          echo "ok — no credential files tracked"

  test-standards:
    name: Test Standards
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python tests/check_test_standards.py

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm audit
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm test
      - name: Build SPA
        working-directory: frontend
        run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: spa-dist-${{ github.run_id }}
          path: src/mediarefinery/web/
          retention-days: 1

  test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v8
        with:
          name: spa-dist-${{ github.run_id }}
          path: src/mediarefinery/web/
      - run: python -m venv .venv && .venv/bin/pip install -e ".[dev,service]" -q
      - run: >-
          .venv/bin/python -m pytest
          -m "not playwright"
          --cov=mediarefinery
          --cov-report=term-missing:skip-covered
          --cov-report=json:tmp/coverage.json
          --cov-fail-under=90
      - run: .venv/bin/python tools/check_coverage.py --json tmp/coverage.json --minimum 90
      - run: |
          .venv/bin/python -m pytest \
            tests/test_scan_privacy.py \
            tests/test_reporter.py \
            tests/test_state.py::test_error_records_redact_paths_secrets_and_media_like_values
      - run: |
          .venv/bin/python -m mediarefinery config validate --config templates/config.example.yml
          .venv/bin/python -m mediarefinery config validate --config templates/config.preset.sensitive.example.yml
          .venv/bin/python -m mediarefinery config validate --config tests/fixtures/config.custom-taxonomy.yml

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Download SPA artifact
        uses: actions/download-artifact@v8
        with:
          name: spa-dist-${{ github.run_id }}
          path: src/mediarefinery/web/
      - name: Install dependencies
        run: pip install -e ".[dev,service]" -r requirements-dev-frontend.txt
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium
      - name: Run E2E tests
        run: python -m pytest tests/e2e_frontend -m playwright -v --tb=short
      - name: Upload E2E coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-e2e-${{ github.run_id }}
          path: coverage-e2e.xml
          retention-days: 1

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install bandit pip-audit
      # Gate on bandit: any MEDIUM+ finding without a documented `# nosec` fails CI.
      - run: bandit -r src/mediarefinery -ll -f json -o bandit-report.json
      # pip-audit stays advisory — upstream CVEs are time-varying and should not block code PRs.
      - run: pip-audit --format json --output pip-audit.json || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports-${{ github.run_id }}
          path: "*.json"
          retention-days: 1
