name: Nightly Build

on:
  push:
    branches: [dev]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Build even if no new commits since last nightly"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  nightly:
    uses: automationnexus/.github/.github/workflows/nightly.yml@v1
    secrets: inherit
    with:
      runner-labels: '["ubuntu-latest"]'
      image-name: automationnexus/mediarefinery
      platforms: linux/amd64
      has-frontend: true
      spa-artifact-path: 'src/mediarefinery/web/'
      coverage-threshold: 90
