on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [dev, main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    uses: automationnexus/.github/.github/workflows/auto-merge.yml@v1
    secrets:
      ci-bot-app-id: ${{ secrets.CI_BOT_APP_ID }}
      ci-bot-app-private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
