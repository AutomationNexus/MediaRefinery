name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing git tag to rebuild (e.g. v2.1.1)"
        required: true
        type: string
      multi_arch:
        description: "Build linux/amd64 + linux/arm64"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  actions: read

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  docker-release:
    uses: automationnexus/.github/.github/workflows/release-docker.yml@v1
    secrets: inherit
    with:
      runner-labels: '["ubuntu-latest"]'
      image-name: automationnexus/mediarefinery
      platforms: linux/amd64
      has-frontend: true
      spa-artifact-path: 'src/mediarefinery/web/'
      has-validation: false
